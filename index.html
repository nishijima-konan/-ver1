  <script>
        // --- 今回の出荷検品用状態管理変数 ---
        var shipmentItems = [];
        var activeScanningMode = "none"; 
        var previousScannedQrText = "";
        var previousScannedQrTime = 0;

        // 過去コードのカメラ変数を引き継ぎ
        let codeReader = null;
        let selectedDeviceId = null;
        let isStreamActive = false;

        var htmlVideo = document.getElementById("video");
        var txtStatus = document.getElementById("status");
        var divResult = document.getElementById("result");
        var txtLog = document.getElementById("log");

        // 過去コードの安全なZXing初期化ロジックを100%継承
        try {
            const hints = new Map();
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
            codeReader = new ZXing.BrowserQRCodeReader(hints);
        } catch (e) {
            console.error("ZXing error", e);
        }

        // ページロード時の初期設定
        window.addEventListener("load", function() {
            appendSystemLog("システム起動: ZXingカメラ初期化完了");
            
            // 通常照合ウィンドウの内部に、CSV選択ボタンを動的に組み込み
            var csvBoxHtml = '<div style="margin-top:10px; padding:10px; background:#fffde7; border:1px dashed #ffd54f; border-radius:6px;">' +
                             '<span style="font-size:12px; font-weight:bold; color:#f57f17;">[必須] まず出荷指示書CSVを選択してください:</span><br>' +
                             '<input type="file" id="csvFileInput" accept=".csv" style="margin-top:6px; width:100%; font-size:14px;">' +
                             '</div>';
            document.getElementById("section-main").insertAdjacentHTML("afterbegin", csvBoxHtml);
            
            // CSV選択時のイベント処理
            document.getElementById("csvFileInput").addEventListener("change", function(evt) {
                var fileObj = evt.target.files.item(0);
                if (!fileObj) return;
                
                var fileReader = new FileReader();
                fileReader.onload = function(loadEvt) {
                    processIncomingCsv(loadEvt.target.result);
                };
                fileReader.readAsText(fileObj, "Shift_JIS"); // 静岡製機㈱等の文字化けを防止
            });

            // 既存のマスターデータベース確認エリアを「出荷リスト」に流用して強制書き換え
            var dbTableArea = document.querySelector(".db-table").parentNode;
            dbTableArea.innerHTML = '<table class="db-table"><thead><tr>' +
                                    '<th>機種分類</th><th>品目番号</th><th>品目名称</th><th>受注数</th><th>実績数</th><th>不足数/状態</th>' +
                                    '</tr></thead><tbody id="shipment-tbody">' +
                                    '<tr><td colspan="6" style="text-align:center; color:#999; padding:15px;">CSVファイルを読み込んでください</td></tr>' +
                                    '</tbody></table>';

            // 不要となった古いモニタリングボックス等は非表示に
            document.getElementById("monitor-box").style.display = "none";
        });

        // --- CSVデータのパースとデータ格納 ---
        function processIncomingCsv(rawCsvText) {
            var allLines = rawCsvText.split(/\r\n|\n/).filter(function(row) { return row.trim() !== ""; });
            if (allLines.length < 4) {
                alert("CSVデータの行数が足りません。");
                return;
            }

            // 2行目の日本語ヘッダーから各項目のインデックスを動的に抽出
            var labelHeaderRow = allLines.slice(1, 2).join("");
            var columnsArray = labelHeaderRow.split(",");
            
            var posType = columnsArray.indexOf("機種分類");
            var posCode = columnsArray.indexOf("品目番号");
            var posName = columnsArray.indexOf("品目名称");
            var posQty  = columnsArray.indexOf("受注数");

            shipmentItems = [];

            // 4行目（データ開始行）から解析ループ
            var actualDataLines = allLines.slice(3);
            actualDataLines.forEach(function(lineText) {
                var columns = lineText.split(",");
                if (columns.length <= 1) return;

                var cType = columns.slice(posType, posType + 1).join("").trim();
                var cCode = columns.slice(posCode, posCode + 1).join("").trim();
                var cName = columns.slice(posName, posName + 1).join("").trim();
                var cQty  = columns.slice(posQty, posQty + 1).join("").trim();

                shipmentItems.push({
                    type: cType,
                    code: cCode,
                    name: cName,
                    target: parseInt(cQty) || 0,
                    scan: 0
                });
            });

            refreshShipmentTable();
            txtStatus.textContent = "CSV読み込み成功。カメラを開始してください。";
            txtStatus.style.color = "#0d47a1";
            appendSystemLog("CSV読み込み完了: " + shipmentItems.length + "件のデータをリスト化");
        }

        // --- 出荷リストテーブルの再描画処理 ---
        function refreshShipmentTable() {
            var tbodyElem = document.getElementById("shipment-tbody");
            tbodyElem.innerHTML = "";

            shipmentItems.forEach(function(item) {
                var trElem = document.createElement("tr");
                var displayStatusText = "不足: " + (item.target - item.scan);
                var elementStyle = "font-weight:bold;";

                if (item.scan === item.target) {
                    displayStatusText = "完了";
                    elementStyle += "background-color:#e6ffe6; color:green; text-align:center;";
                } else if (item.scan > item.target) {
                    displayStatusText = "過剰NG";
                    elementStyle += "background-color:#ffe6e6; color:red; text-align:center; animation: blink 1s infinite;";
                }

                var rowHtml = "<td>" + item.type + "</td>" +
                              "<td><strong>" + item.code + "</strong></td>" +
                              "<td>" + item.name + "</td>" +
                              "<td>" + item.target + "</td>" +
                              "<td><strong>" + item.scan + "</strong></td>" +
                              "<td style='" + elementStyle + "'>" + displayStatusText + "</td>";

                trElem.innerHTML = rowHtml;
                tbodyElem.appendChild(trElem);
            });
        }
        // --- 過去コードの最も安定したカメラ起動処理をそのまま移植 ---
        async function startMainScan() {
            activeScanningMode = "SHIPMENT_CHECK";
            document.getElementById('status').textContent = "出荷検品スキャン中... 社内ラベルを写してください";
            vibStart();
            if (!isStreamActive) {
                await startCameraStream();
            }
        }

        function stopScan() {
            activeScanningMode = "none";
            if (codeReader) codeReader.reset();
            var videoElement = document.getElementById('video');
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(function(track) { track.stop(); });
            }
            videoElement.srcObject = null;
            isStreamActive = false;
            document.getElementById('status').textContent = "停止中";
            appendSystemLog("スキャンを停止しました");
        }

        async function startCameraStream() {
            if (codeReader) codeReader.reset();
            clearOverlay();

            try {
                if (!selectedDeviceId) {
                    const videoInputDevices = await codeReader.listVideoInputDevices();
                    const backCamera = videoInputDevices.find(device => 
                        device.label.toLowerCase().includes('back') || 
                        device.label.toLowerCase().includes('environment')
                    );
                    selectedDeviceId = backCamera ? backCamera.deviceId : videoInputDevices[0].deviceId;
                }

                // 過去に成功した画質・フォーカス設定を100%適用
                const constraints = {
                    video: {
                        deviceId: { exact: selectedDeviceId },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        focusMode: { ideal: "continuous" }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoElement = document.getElementById('video');
                videoElement.srcObject = stream;
                isStreamActive = true;

                codeReader.decodeFromStream(stream, 'video', (result, err) => {
                    if (result && activeScanningMode === "SHIPMENT_CHECK") {
                        const now = Date.now();
                        // 連続読み込みを防止するインターバル
                        if (now - previousScannedQrTime < 2500) return;
                        if (result.text.length < 5) return; 

                        previousScannedQrTime = now;
                        if (result.resultPoints) drawBox(result.resultPoints);
                        handleIncomingScan(result.text);
                    }
                });

            } catch (err) {
                console.error("Camera error: ", err);
                document.getElementById('status').textContent = "カメラ起動エラー";
            }
        }

        // --- 社内ラベルのQRテキスト解析と出荷リストの突合処理 ---
        function handleIncomingScan(qrText) {
            if (!qrText) return;

            // 社内ラベルをカンマで分解 (例: 5082420105600,,RKF406/506 ｽｲｯﾁﾍﾞｰｽ,50)
            var elementsArray = qrText.split(",");
            if (elementsArray.length < 4) {
                appendSystemLog("【エラー】データ項目数が足りないQR: " + qrText);
                vibNG();
                return;
            }

            // 大カッコのバグ消去を防ぐため、sliceを使って安全に品目番号と数量を抽出
            var scannedItemCode = elementsArray.slice(0, 1).join("").trim();
            var scannedBoxQty  = parseInt(elementsArray.slice(3, 4).join("").trim()) || 1;

            var isMatched = false;

            // 出荷リスト（CSV）から一致する品目番号を探索
            for (var idx = 0; idx < shipmentItems.length; idx++) {
                var currentItem = shipmentItems[idx];
                
                if (currentItem.code === scannedItemCode) {
                    // QRコード内の入数（50個など）を実績数に加算
                    currentItem.scan += scannedBoxQty;
                    isMatched = true;

                    // リアルタイムな状態変更の判定
                    var resultArea = document.getElementById("result");
                    if (currentItem.scan === currentItem.target) {
                        resultArea.className = "ok";
                        resultArea.textContent = "完了 OK";
                        document.getElementById('status').textContent = "【" + currentItem.name + "】検品完了！";
                        vibOK();
                    } else if (currentItem.scan > currentItem.target) {
                        resultArea.className = "ng";
                        resultArea.textContent = "過剰NG";
                        document.getElementById('status').textContent = "【" + currentItem.name + "】受注数量を超過しました！";
                        vibNG();
                    } else {
                        resultArea.className = "ok";
                        resultArea.textContent = "加算OK";
                        var remain = currentItem.target - currentItem.scan;
                        document.getElementById('status').textContent = currentItem.name + " 残り: " + remain + "個";
                        vibOK();
                    }

                    appendSystemLog("【一致】品目:" + scannedItemCode + " に " + scannedBoxQty + " 個加算 (実績:" + currentItem.scan + ")");
                    break;
                }
            }

            if (!isMatched) {
                var resultArea = document.getElementById("result");
                resultArea.className = "ng";
                resultArea.textContent = "リスト外NG";
                document.getElementById('status').textContent = "出荷リストに無い商品コードです！";
                appendSystemLog("【NG】出荷リスト外の品目番号: " + scannedItemCode);
                vibNG();
            }

            refreshShipmentTable();
        }
        // --- 過去コードの枠線描画・結果表示・ログ関数をそのまま移植 ---
        function drawBox(points) {
            const overlay = document.getElementById("overlay");
            const video = document.getElementById("video");
            overlay.width = video.clientWidth;
            overlay.height = video.clientHeight;
            const ctx = overlay.getContext("2d");
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 4;
            ctx.beginPath();
            const scaleX = video.clientWidth / video.videoWidth;
            const scaleY = video.clientHeight / video.videoHeight;
            ctx.moveTo(points[0].getX() * scaleX, points[0].getY() * scaleY);
            for(let i=1; i<points.length; i++) {
                ctx.lineTo(points[i].getX() * scaleX, points[i].getY() * scaleY);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function clearOverlay() {
            const overlay = document.getElementById("overlay");
            const octx = overlay.getContext("2d");
            octx.clearRect(0, 0, overlay.width, overlay.height);
        }

        function clearOverlayDelayed() {
            setTimeout(clearOverlay, 800);
        }

        // システム用の補助ログ出力
        function appendSystemLog(msg) {
            const log = document.getElementById("log");
            const time = new Date().toLocaleTimeString();
            log.textContent = `[${time}] ${msg}\n` + log.textContent;
        }
    </script>
</body>
</html>
