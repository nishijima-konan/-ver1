<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>出荷検品システム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; margin: 0; background: #f5f5f5; }
        .box { border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; border-radius: 8px; background: #fff; }
        button { padding: 12px; font-size: 16px; width: 100%; font-weight: bold; background: #28a745; color: white; border: none; border-radius: 6px; }
        
        /* 過去の成功コードからビデオラッパーと表示スタイルを完全移植 */
        #video-wrapper { width: 100%; max-width: 380px; margin: 10px auto; position: relative; overflow: hidden; border-radius: 8px; border: 2px solid #ccc; background: #000; display: none; }
        #video { width: 100%; display: block; transform: scaleX(1); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f1f5f9; }
        .status-done { color: green; font-weight: bold; background: #e6ffe6; }
        .status-over { color: red; font-weight: bold; background: #ffe6e6; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.4;} }
        #log { font-size: 12px; background: #eee; padding: 6px; max-height: 100px; overflow-y: auto; white-space: pre-wrap; margin-top: 8px; }
    </style>
</head>
<body>

    <h1>出荷検品システム</h1>

    <div class="box">
        <h2>1. CSV読み込み</h2>
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <div class="box">
        <h2>2. QRスキャン</h2>
        <div id="status" style="font-weight:bold;color:#0d47a1;margin-bottom:8px;">CSVを選んでください</div>
        <button id="startBtn" disabled>カメラを起動する</button>
        <div id="video-wrapper">
            <video id="video" playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>
        <div id="log">ログがここに表示されます</div>
    </div>

    <h2>出荷リスト</h2>
    <table>
        <thead>
            <tr><th>機種</th><th>品目番号</th><th>品目名称</th><th>受注</th><th>実績</th><th>状態</th></tr>
        </thead>
        <tbody id="listBody">
            <tr><td colspan="6" style="text-align:center;color:#999;">CSVを読み込んでください</td></tr>
        </tbody>
    </table>

    <script>
        var items = [];
        var stream = null;
        var active = false;
        var lastCode = "";
        var lastTime = 0;

        var video = document.getElementById("video");
        var canvas = document.getElementById("canvas");
        var ctx = canvas.getContext("2d");
        var btn = document.getElementById("startBtn");
        var stat = document.getElementById("status");
        var logBox = document.getElementById("log");

        // CSV読み込み
        document.getElementById("csvFile").addEventListener("change", function(e) {
            var file = e.target.files.item(0);
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(evt) {
                parseCsv(evt.target.result);
            };
            reader.readAsText(file, "Shift_JIS");
        });

        function parseCsv(text) {
            var lines = text.split(/\r\n|\n/).filter(line => line.trim() !== "");
            if (lines.length < 4) return;

            var headerRowText = lines.slice(1, 2).join("");
            var labels = headerRowText.split(",");
            
            var iType = labels.indexOf("機種分類");
            var iCode = labels.indexOf("品目番号");
            var iName = labels.indexOf("品目名称");
            var iQty = labels.indexOf("受注数");

            items = [];
            
            var dataLines = lines.slice(3);
            dataLines.forEach(function(line) {
                var cols = line.split(",");
                if (cols.length <= 1) return;
                
                var getType = cols.slice(iType, iType + 1).join("").trim();
                var getCode = cols.slice(iCode, iCode + 1).join("").trim();
                var getName = cols.slice(iName, iName + 1).join("").trim();
                var getQty  = cols.slice(iQty, iQty + 1).join("").trim();

                items.push({
                    type: getType,
                    code: getCode,
                    name: getName,
                    target: parseInt(getQty) || 0,
                    scan: 0
                });
            });

            showTable();
            stat.textContent = "CSV完了。カメラを起動してください。";
            btn.disabled = false;
        }

        function showTable() {
            var tbody = document.getElementById("listBody");
            tbody.innerHTML = "";
            items.forEach(function(item) {
                var tr = document.createElement("tr");
                var stText = "不足: " + (item.target - item.scan);
                var stClass = "";
                if (item.scan === item.target) { stText = "完了"; stClass = "status-done"; }
                if (item.scan > item.target) { stText = "過剰NG"; stClass = "status-over"; }

                tr.innerHTML = "<td>" + item.type + "</td><td>" + item.code + "</td><td>" + item.name + "</td><td>" + item.target + "</td><td>" + item.scan + "</td><td class='" + stClass + "'>" + stText + "</td>";
                tbody.appendChild(tr);
            });
        }

        // カメラ制御（過去の成功コードの設定に完全修正）
        btn.addEventListener("click", async function() {
            if (active) {
                stopCam();
                return;
            }
            stat.textContent = "カメラ起動中...";
            
            // 過去コードの挙動に合わせ、あえて解像度を固定せず、背面・標準モードでブラウザに最適に任せる設定
            var constraints = { 
                video: { 
                    facingMode: "environment" 
                } 
            };
            
            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                document.getElementById("video-wrapper").style.display = "block";
                btn.textContent = "カメラを停止する";
                btn.style.background = "#dc3545";
                stat.textContent = "QRを写してください";
                active = true;
                requestAnimationFrame(loop);
            } catch (err) {
                stat.textContent = "カメラ起動失敗。権限を確認してください。";
            }
        });

        function stopCam() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            document.getElementById("video-wrapper").style.display = "none";
            btn.textContent = "カメラを起動する";
            btn.style.background = "#28a745";
            stat.textContent = "停止しました";
            active = false;
        }

        function loop() {
            if (!active) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
                var qr = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });

                if (qr) {
                    var now = Date.now();
                    // 連続読み込みを防止するため2.5秒の間隔を空ける
                    if (qr.data !== lastCode || (now - lastTime > 2500)) {
                        lastCode = qr.data;
                        lastTime = now;
                        checkQr(qr.data);
                    }
                }
            }
            requestAnimationFrame(loop);
        }

        function checkQr(text) {
            var d = new Date();
            var time = "[" + d.getHours() + ":" + d.getMinutes() + ":" + d.getSeconds() + "] ";
            logBox.textContent = time + "読取: " + text + "\n" + logBox.textContent;

            var arr = text.split(",");
            if (arr.length < 4) return;

            var qrCode = arr.slice(0, 1).join("").trim();
            var qrQty  = parseInt(arr.slice(3, 4).join("").trim()) || 1;
            var hit = false;

            for (var i = 0; i < items.length; i++) {
                if (items[i].code === qrCode) {
                    items[i].scan += qrQty;
                    hit = true;
                    if (navigator.vibrate) navigator.vibrate(200);
                    break;
                }
            }
            if (!hit && navigator.vibrate) navigator.vibrate(400);
            showTable();
        }
    </script>
</body>
</html>
